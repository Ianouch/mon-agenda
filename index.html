<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mon Agenda</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --surface2: #1a1a25;
    --border: #2a2a3a;
    --accent: #6c63ff;
    --accent2: #ff6b6b;
    --accent3: #43e97b;
    --accent4: #f7971e;
    --accent5: #00c6ff;
    --text: #e8e8f0;
    --text-muted: #6b6b8a;
    --radius: 14px;
    --glow: 0 0 30px rgba(108,99,255,0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background effect */
  body::before {
    content: '';
    position: fixed;
    top: -200px; left: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(108,99,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }
  body::after {
    content: '';
    position: fixed;
    bottom: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,107,107,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(10,10,15,0.85);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 64px;
  }

  .logo {
    font-family: 'Space Mono', monospace;
    font-size: 1.1rem;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--accent);
  }
  .logo span { color: var(--text-muted); font-weight: 400; }

  .date-display {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* NAV TABS */
  .nav-tabs {
    display: flex;
    gap: 0.25rem;
    padding: 1rem 2rem 0;
    border-bottom: 1px solid var(--border);
    position: relative;
    z-index: 1;
  }

  .tab-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    padding: 0.6rem 1.2rem;
    cursor: pointer;
    border-radius: var(--radius) var(--radius) 0 0;
    transition: all 0.2s;
    position: relative;
    letter-spacing: 0.03em;
  }
  .tab-btn.active {
    color: var(--text);
    background: var(--surface);
  }
  .tab-btn.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: var(--accent);
    border-radius: 2px 2px 0 0;
  }
  .tab-btn:hover:not(.active) { color: var(--text); background: rgba(255,255,255,0.03); }

  /* MAIN LAYOUT */
  main {
    max-width: 1400px;
    margin: 0 auto;
    padding: 1.5rem 2rem 4rem;
    position: relative;
    z-index: 1;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* WEEK VIEW */
  .week-header {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .week-nav { display: flex; gap: 0.5rem; }
  .nav-btn {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.9rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .nav-btn:hover { background: var(--accent); border-color: var(--accent); }

  .week-label {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.03em;
  }

  .week-grid {
    display: grid;
    grid-template-columns: 60px repeat(7, 1fr);
    gap: 0;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    background: var(--surface);
  }

  .week-day-header {
    background: var(--surface2);
    padding: 0.7rem 0.5rem;
    text-align: center;
    font-size: 0.72rem;
    font-weight: 700;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text-muted);
    border-bottom: 1px solid var(--border);
    border-right: 1px solid var(--border);
  }
  .week-day-header.today { color: var(--accent); }
  .week-day-header:last-child { border-right: none; }
  .week-time-label { background: var(--surface2); }

  .week-cell {
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    min-height: 52px;
    position: relative;
    cursor: pointer;
    transition: background 0.15s;
  }
  .week-cell:last-child { border-right: none; }
  .week-cell:hover { background: rgba(108,99,255,0.04); }
  .week-cell.today-col { background: rgba(108,99,255,0.03); }

  .time-slot {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    padding: 0.35rem 0.5rem;
    border-right: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    text-align: right;
  }

  .course-block {
    position: absolute;
    left: 2px; right: 2px; top: 2px; bottom: 2px;
    border-radius: 6px;
    padding: 4px 6px;
    font-size: 0.68rem;
    font-weight: 700;
    cursor: pointer;
    overflow: hidden;
    z-index: 2;
    display: flex;
    flex-direction: column;
    gap: 1px;
  }
  .course-block .course-title { font-size: 0.7rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .course-block .course-room { font-family: 'Space Mono', monospace; font-size: 0.6rem; opacity: 0.8; }

  /* DAY VIEW */
  .day-header {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .day-title { font-size: 2rem; font-weight: 800; letter-spacing: -0.04em; }
  .day-sub { color: var(--text-muted); font-family: 'Space Mono', monospace; font-size: 0.75rem; }

  .day-layout { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; }

  .day-timeline {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .timeline-row {
    display: grid;
    grid-template-columns: 60px 1fr;
    border-bottom: 1px solid var(--border);
    min-height: 56px;
  }
  .timeline-row:last-child { border-bottom: none; }
  .timeline-hour {
    font-family: 'Space Mono', monospace;
    font-size: 0.65rem;
    color: var(--text-muted);
    padding: 0.5rem;
    text-align: right;
    background: var(--surface2);
    border-right: 1px solid var(--border);
    display: flex; align-items: flex-start; justify-content: flex-end;
    padding-top: 8px;
  }
  .timeline-slot {
    padding: 4px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .timeline-slot:hover { background: rgba(108,99,255,0.04); }

  .day-event {
    border-radius: 8px;
    padding: 6px 10px;
    margin: 2px 0;
    cursor: pointer;
    font-size: 0.8rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.15s, opacity 0.15s;
  }
  .day-event:hover { transform: translateX(2px); }
  .day-event .ev-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
  .day-event .ev-name { flex: 1; }
  .day-event .ev-time { font-family: 'Space Mono', monospace; font-size: 0.65rem; opacity: 0.7; }

  /* MONTH VIEW */
  .month-header {
    display: flex; align-items: center; gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .month-label { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.04em; }
  .month-grid {
    display: grid;
    grid-template-columns: repeat(7, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
  }
  .month-day-label {
    background: var(--surface2);
    text-align: center;
    padding: 0.5rem;
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
  }
  .month-cell {
    background: var(--surface);
    min-height: 90px;
    padding: 6px;
    cursor: pointer;
    transition: background 0.15s;
  }
  .month-cell:hover { background: var(--surface2); }
  .month-cell.other-month { opacity: 0.35; }
  .month-cell.today { background: rgba(108,99,255,0.08); }
  .month-cell .day-num {
    font-family: 'Space Mono', monospace;
    font-size: 0.75rem;
    font-weight: 700;
    margin-bottom: 4px;
    color: var(--text-muted);
  }
  .month-cell.today .day-num { color: var(--accent); }
  .month-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    margin: 1px;
  }

  /* SIDEBAR WIDGETS */
  .sidebar { display: flex; flex-direction: column; gap: 1rem; }

  .widget {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    box-shadow: var(--glow);
  }
  .widget-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 0.9rem 1rem;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }
  .widget-title {
    font-size: 0.78rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    display: flex; align-items: center; gap: 6px;
  }
  .widget-dot { width: 8px; height: 8px; border-radius: 50%; }
  .add-btn {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-muted);
    width: 24px; height: 24px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 1rem;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.2s;
  }
  .add-btn:hover { border-color: var(--accent); color: var(--accent); }

  .widget-body { padding: 0.75rem; }

  /* TASKS */
  .task-item {
    display: flex;
    align-items: flex-start;
    gap: 8px;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer;
    transition: opacity 0.2s;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn { from { opacity:0; transform: translateX(-8px); } to { opacity:1; transform: none; } }
  .task-item:last-child { border-bottom: none; }
  .task-item.done { opacity: 0.4; }
  .task-cb {
    width: 16px; height: 16px;
    border-radius: 4px;
    border: 1px solid var(--border);
    flex-shrink: 0;
    margin-top: 1px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6rem;
    transition: all 0.2s;
  }
  .task-item.done .task-cb { background: var(--accent3); border-color: var(--accent3); }
  .task-text {
    font-size: 0.82rem;
    line-height: 1.4;
    flex: 1;
  }
  .task-item.done .task-text { text-decoration: line-through; }
  .task-del {
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer;
    font-size: 0.8rem;
    opacity: 0;
    transition: opacity 0.15s;
    padding: 0 2px;
  }
  .task-item:hover .task-del { opacity: 1; }
  .task-del:hover { color: var(--accent2); }

  .empty-state {
    text-align: center;
    padding: 1rem;
    color: var(--text-muted);
    font-size: 0.78rem;
  }

  /* DEADLINES */
  .deadline-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    animation: slideIn 0.2s ease;
  }
  .deadline-item:last-child { border-bottom: none; }
  .deadline-badge {
    font-family: 'Space Mono', monospace;
    font-size: 0.6rem;
    padding: 2px 6px;
    border-radius: 4px;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .deadline-text { font-size: 0.82rem; flex: 1; }
  .deadline-del {
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer; font-size: 0.8rem;
    opacity: 0; transition: opacity 0.15s;
  }
  .deadline-item:hover .deadline-del { opacity: 1; }
  .deadline-del:hover { color: var(--accent2); }

  /* NOTES */
  .note-item {
    padding: 0.6rem;
    background: rgba(255,255,255,0.03);
    border-radius: 8px;
    margin-bottom: 0.5rem;
    font-size: 0.8rem;
    line-height: 1.5;
    border-left: 2px solid var(--accent5);
    animation: slideIn 0.2s ease;
    position: relative;
  }
  .note-item .note-del {
    position: absolute; top: 4px; right: 6px;
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer; font-size: 0.75rem;
    opacity: 0; transition: opacity 0.15s;
  }
  .note-item:hover .note-del { opacity: 1; }
  .note-del:hover { color: var(--accent2); }

  /* TRADING */
  .trading-item {
    display: flex; align-items: center; gap: 8px;
    padding: 0.5rem 0;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    animation: slideIn 0.2s ease;
  }
  .trading-item:last-child { border-bottom: none; }
  .trading-icon { font-size: 0.9rem; }
  .trading-text { font-size: 0.82rem; flex: 1; }
  .trading-tag {
    font-family: 'Space Mono', monospace;
    font-size: 0.58rem;
    padding: 2px 6px;
    border-radius: 4px;
    background: rgba(247,151,30,0.15);
    color: var(--accent4);
    border: 1px solid rgba(247,151,30,0.2);
  }
  .trading-del {
    background: none; border: none;
    color: var(--text-muted);
    cursor: pointer; font-size: 0.8rem;
    opacity: 0; transition: opacity 0.15s;
  }
  .trading-item:hover .trading-del { opacity: 1; }
  .trading-del:hover { color: var(--accent2); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.7);
    backdrop-filter: blur(4px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 1.5rem;
    width: 380px;
    max-width: 95vw;
    animation: modalIn 0.2s ease;
    box-shadow: 0 0 60px rgba(0,0,0,0.5);
  }
  @keyframes modalIn { from { opacity:0; transform: scale(0.95) translateY(10px); } to { opacity:1; transform: none; } }
  .modal h3 { font-size: 1.1rem; font-weight: 800; margin-bottom: 1rem; }
  .modal label {
    display: block;
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 0.4rem;
    margin-top: 0.8rem;
  }
  .modal label:first-of-type { margin-top: 0; }
  .modal input, .modal select, .modal textarea {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 8px;
    padding: 0.5rem 0.75rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.85rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .modal input:focus, .modal select:focus, .modal textarea:focus { border-color: var(--accent); }
  .modal textarea { resize: vertical; min-height: 70px; }
  .modal-actions { display: flex; gap: 0.5rem; margin-top: 1.2rem; }
  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: #fff;
    border: none;
    padding: 0.6rem 1rem;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-primary:hover { background: #7c74ff; transform: translateY(-1px); }
  .btn-secondary {
    background: var(--surface2);
    color: var(--text-muted);
    border: 1px solid var(--border);
    padding: 0.6rem 1rem;
    border-radius: 8px;
    font-family: 'Syne', sans-serif;
    font-weight: 600;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .btn-secondary:hover { color: var(--text); }

  .color-row { display: flex; gap: 6px; flex-wrap: wrap; }
  .color-swatch {
    width: 24px; height: 24px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid transparent;
    transition: border-color 0.15s, transform 0.15s;
  }
  .color-swatch:hover { transform: scale(1.1); }
  .color-swatch.selected { border-color: white; }

  /* PROGRESS BAR */
  .progress-bar {
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
    margin-top: 0.5rem;
  }
  .progress-fill { height: 100%; border-radius: 2px; transition: width 0.5s ease; }

  /* STATS ROW */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 1.5rem;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 1rem;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: transform 0.2s, box-shadow 0.2s;
  }
  .stat-card:hover { transform: translateY(-2px); box-shadow: var(--glow); }
  .stat-label { font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.08em; color: var(--text-muted); }
  .stat-value { font-size: 1.6rem; font-weight: 800; letter-spacing: -0.04em; }
  .stat-sub { font-size: 0.7rem; color: var(--text-muted); }

  /* SCROLLBAR */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .full-grid { display: grid; grid-template-columns: 1fr 320px; gap: 1.5rem; }
  .full-col { display: flex; flex-direction: column; gap: 1rem; }
</style>
</head>
<body>

<header>
  <div class="logo">agenda<span>.perso</span></div>
  <div class="date-display" id="headerDate"></div>
</header>

<nav class="nav-tabs">
  <button class="tab-btn active" onclick="switchView('day')">📅 Jour</button>
  <button class="tab-btn" onclick="switchView('week')">🗓 Semaine</button>
  <button class="tab-btn" onclick="switchView('month')">📆 Mois</button>
</nav>

<main>

  <!-- DAY VIEW -->
  <div class="view active" id="view-day">
    <div class="day-header">
      <div class="nav-btn" onclick="changeDay(-1)">◀</div>
      <div>
        <div class="day-title" id="dayTitle"></div>
        <div class="day-sub" id="daySubtitle"></div>
      </div>
      <div class="nav-btn" onclick="changeDay(1)">▶</div>
      <div class="nav-btn" onclick="goToday()" title="Aujourd'hui" style="font-size:0.65rem;width:auto;padding:0 8px;">TODAY</div>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-label">Cours aujourd'hui</div>
        <div class="stat-value" id="statCours" style="color:var(--accent)">0</div>
        <div class="stat-sub">cours planifiés</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Tâches</div>
        <div class="stat-value" id="statTasks" style="color:var(--accent3)">0</div>
        <div class="stat-sub">à compléter</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Deadlines</div>
        <div class="stat-value" id="statDeadlines" style="color:var(--accent2)">0</div>
        <div class="stat-sub">cette semaine</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Trading</div>
        <div class="stat-value" id="statTrading" style="color:var(--accent4)">0</div>
        <div class="stat-sub">à apprendre</div>
      </div>
    </div>

    <div class="day-layout">
      <div class="day-timeline" id="dayTimeline"></div>

      <div class="sidebar">
        <!-- TASKS -->
        <div class="widget">
          <div class="widget-header">
            <div class="widget-title"><div class="widget-dot" style="background:var(--accent3)"></div>Tâches du jour</div>
            <button class="add-btn" onclick="openModal('task')">+</button>
          </div>
          <div class="widget-body" id="taskList"><div class="empty-state">Aucune tâche pour aujourd'hui</div></div>
          <div style="padding:0 0.75rem 0.75rem">
            <div class="progress-bar"><div class="progress-fill" id="taskProgress" style="background:var(--accent3);width:0%"></div></div>
          </div>
        </div>

        <!-- DEADLINES -->
        <div class="widget">
          <div class="widget-header">
            <div class="widget-title"><div class="widget-dot" style="background:var(--accent2)"></div>Devoirs & Deadlines</div>
            <button class="add-btn" onclick="openModal('deadline')">+</button>
          </div>
          <div class="widget-body" id="deadlineList"><div class="empty-state">Aucun devoir en attente</div></div>
        </div>

        <!-- TRADING -->
        <div class="widget">
          <div class="widget-header">
            <div class="widget-title"><div class="widget-dot" style="background:var(--accent4)"></div>Apprentissage Trading</div>
            <button class="add-btn" onclick="openModal('trading')">+</button>
          </div>
          <div class="widget-body" id="tradingList"><div class="empty-state">Aucune leçon de trading</div></div>
        </div>

        <!-- NOTES -->
        <div class="widget">
          <div class="widget-header">
            <div class="widget-title"><div class="widget-dot" style="background:var(--accent5)"></div>Notes rapides</div>
            <button class="add-btn" onclick="openModal('note')">+</button>
          </div>
          <div class="widget-body" id="noteList"><div class="empty-state">Aucune note</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- WEEK VIEW -->
  <div class="view" id="view-week">
    <div class="week-header">
      <div class="nav-btn" onclick="changeWeek(-1)">◀</div>
      <div class="week-label" id="weekLabel"></div>
      <div class="nav-btn" onclick="changeWeek(1)">▶</div>
      <button class="add-btn" style="width:auto;padding:0 12px;height:32px;" onclick="openModal('course')">+ Cours</button>
    </div>
    <div class="week-grid" id="weekGrid"></div>
  </div>

  <!-- MONTH VIEW -->
  <div class="view" id="view-month">
    <div class="month-header">
      <div class="nav-btn" onclick="changeMonth(-1)">◀</div>
      <div class="month-label" id="monthLabel"></div>
      <div class="nav-btn" onclick="changeMonth(1)">▶</div>
    </div>
    <div class="month-grid" id="monthGrid"></div>
  </div>

</main>

<!-- MODALS -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modalBox"></div>
</div>

<script>
// ===== STATE =====
let today = new Date();
today.setHours(0,0,0,0);
let currentDay = new Date(today);
let currentWeekOffset = 0;
let currentMonthDate = new Date(today);

const COLORS = ['#6c63ff','#ff6b6b','#43e97b','#f7971e','#00c6ff','#a78bfa','#f472b6','#34d399'];

let data = {
  courses: [],   // {id, title, room, day, startHour, endHour, color}
  tasks: [],     // {id, text, done, date}
  deadlines: [], // {id, text, dueDate, urgency}
  trading: [],   // {id, text, tag, done}
  notes: []      // {id, text}
};

function save() { localStorage.setItem('agenda_data', JSON.stringify(data)); }
function load() {
  const d = localStorage.getItem('agenda_data');
  if (d) data = JSON.parse(d);
}
load();

// ===== HELPERS =====
const DAYS_FR = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const DAYS_SHORT = ['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];

function dateKey(d) { return d.toISOString().split('T')[0]; }
function parseDate(s) { const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function sameDay(a, b) { return dateKey(a) === dateKey(b); }

function getMonday(d) {
  const day = new Date(d);
  const dow = day.getDay();
  const diff = dow === 0 ? -6 : 1 - dow;
  day.setDate(day.getDate() + diff);
  return day;
}

function urgencyStyle(u) {
  if (u === 'urgent') return { bg: 'rgba(255,107,107,0.15)', color: 'var(--accent2)', border: 'rgba(255,107,107,0.3)' };
  if (u === 'soon') return { bg: 'rgba(247,151,30,0.15)', color: 'var(--accent4)', border: 'rgba(247,151,30,0.3)' };
  return { bg: 'rgba(67,233,123,0.1)', color: 'var(--accent3)', border: 'rgba(67,233,123,0.2)' };
}

// ===== HEADER =====
function updateHeader() {
  const opts = { weekday:'long', day:'numeric', month:'long', year:'numeric' };
  document.getElementById('headerDate').textContent = today.toLocaleDateString('fr-FR', opts);
}
updateHeader();

// ===== STATS =====
function updateStats() {
  const todayKey = dateKey(currentDay);
  const dayCourses = data.courses.filter(c => c.day === currentDay.getDay());
  const dayTasks = data.tasks.filter(t => t.date === todayKey);
  const pending = dayTasks.filter(t => !t.done).length;
  
  // Deadlines this week
  const monday = getMonday(today);
  const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6);
  const weekDeadlines = data.deadlines.filter(d => {
    if (!d.dueDate) return false;
    const dd = parseDate(d.dueDate);
    return dd >= monday && dd <= sunday;
  });

  document.getElementById('statCours').textContent = dayCourses.length;
  document.getElementById('statTasks').textContent = pending;
  document.getElementById('statDeadlines').textContent = weekDeadlines.length;
  document.getElementById('statTrading').textContent = data.trading.filter(t => !t.done).length;
}

// ===== DAY VIEW =====
const HOURS = Array.from({length: 18}, (_, i) => i + 7); // 7h–00h (minuit)

function renderDay() {
  const d = currentDay;
  const opts = { weekday:'long', day:'numeric', month:'long' };
  document.getElementById('dayTitle').textContent = d.toLocaleDateString('fr-FR', opts);
  document.getElementById('daySubtitle').textContent = sameDay(d, today) ? '— Aujourd\'hui' : '';

  // Timeline
  const tl = document.getElementById('dayTimeline');
  tl.innerHTML = '';
  const todayKey = dateKey(d);
  const dayCourses = data.courses.filter(c => c.day === d.getDay());

  HOURS.forEach(h => {
    const row = document.createElement('div');
    row.className = 'timeline-row';

    const hour = document.createElement('div');
    hour.className = 'timeline-hour';
    hour.textContent = h === 24 ? '00:00' : h + ':00';

    const slot = document.createElement('div');
    slot.className = 'timeline-slot';
    slot.onclick = () => openModal('course', { prefillHour: h, prefillDay: d.getDay() });

    // Render courses that start at this hour
    dayCourses.filter(c => c.startHour == h).forEach(c => {
      const ev = document.createElement('div');
      ev.className = 'day-event';
      ev.style.background = c.color + '22';
      ev.style.borderLeft = `3px solid ${c.color}`;
      ev.innerHTML = `
        <div class="ev-dot" style="background:${c.color}"></div>
        <span class="ev-name">${c.title}${c.room ? ' · ' + c.room : ''}</span>
        <span class="ev-time">${(c.startHour===24?'00':String(c.startHour).padStart(2,'0'))}h–${(c.endHour===24?'00':String(c.endHour).padStart(2,'0'))}h</span>
      `;
      ev.onclick = e => { e.stopPropagation(); openModal('course-edit', c); };
      slot.appendChild(ev);
    });

    row.appendChild(hour);
    row.appendChild(slot);
    tl.appendChild(row);
  });

  // Tasks
  const taskList = document.getElementById('taskList');
  const tasks = data.tasks.filter(t => t.date === todayKey);
  if (tasks.length === 0) {
    taskList.innerHTML = '<div class="empty-state">Aucune tâche — bonne journée ! 🎉</div>';
  } else {
    taskList.innerHTML = '';
    tasks.forEach(t => {
      const div = document.createElement('div');
      div.className = 'task-item' + (t.done ? ' done' : '');
      div.innerHTML = `
        <div class="task-cb">${t.done ? '✓' : ''}</div>
        <span class="task-text">${t.text}</span>
        <button class="task-del" onclick="deleteItem('tasks','${t.id}')">✕</button>
      `;
      div.querySelector('.task-cb').onclick = () => toggleTask(t.id);
      taskList.appendChild(div);
    });
    // Progress
    const done = tasks.filter(t => t.done).length;
    document.getElementById('taskProgress').style.width = (done / tasks.length * 100) + '%';
  }

  // Deadlines
  const dl = document.getElementById('deadlineList');
  if (data.deadlines.length === 0) {
    dl.innerHTML = '<div class="empty-state">Aucun devoir en attente ✅</div>';
  } else {
    dl.innerHTML = '';
    data.deadlines.forEach(d => {
      const st = urgencyStyle(d.urgency);
      const item = document.createElement('div');
      item.className = 'deadline-item';
      const dueStr = d.dueDate ? parseDate(d.dueDate).toLocaleDateString('fr-FR', {day:'numeric', month:'short'}) : '?';
      item.innerHTML = `
        <span class="deadline-badge" style="background:${st.bg};color:${st.color};border:1px solid ${st.border}">${dueStr}</span>
        <span class="deadline-text">${d.text}</span>
        <button class="deadline-del" onclick="deleteItem('deadlines','${d.id}')">✕</button>
      `;
      dl.appendChild(item);
    });
  }

  // Trading
  const tr = document.getElementById('tradingList');
  if (data.trading.length === 0) {
    tr.innerHTML = '<div class="empty-state">Ajoute tes sujets à apprendre 📈</div>';
  } else {
    tr.innerHTML = '';
    data.trading.forEach(t => {
      const item = document.createElement('div');
      item.className = 'trading-item';
      item.style.opacity = t.done ? '0.45' : '1';
      item.innerHTML = `
        <span class="trading-icon" style="cursor:pointer" onclick="toggleTrading('${t.id}')">${t.done ? '✅' : '📖'}</span>
        <span class="trading-text" style="${t.done ? 'text-decoration:line-through' : ''}">${t.text}</span>
        ${t.tag ? `<span class="trading-tag">${t.tag}</span>` : ''}
        <button class="trading-del" onclick="deleteItem('trading','${t.id}')">✕</button>
      `;
      tr.appendChild(item);
    });
  }

  // Notes
  const nl = document.getElementById('noteList');
  if (data.notes.length === 0) {
    nl.innerHTML = '<div class="empty-state">Aucune note 📝</div>';
  } else {
    nl.innerHTML = '';
    data.notes.forEach(n => {
      const div = document.createElement('div');
      div.className = 'note-item';
      div.innerHTML = `${n.text}<button class="note-del" onclick="deleteItem('notes','${n.id}')">✕</button>`;
      nl.appendChild(div);
    });
  }

  updateStats();
}

function toggleTask(id) {
  const t = data.tasks.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); renderDay(); }
}
function toggleTrading(id) {
  const t = data.trading.find(t => t.id === id);
  if (t) { t.done = !t.done; save(); renderDay(); }
}
function deleteItem(type, id) {
  data[type] = data[type].filter(i => i.id !== id);
  save(); renderAll();
}

function changeDay(delta) {
  currentDay.setDate(currentDay.getDate() + delta);
  renderDay();
}
function goToday() {
  currentDay = new Date(today);
  renderDay();
}

// ===== WEEK VIEW =====
function renderWeek() {
  const monday = getMonday(new Date(today));
  monday.setDate(monday.getDate() + currentWeekOffset * 7);
  const sunday = new Date(monday); sunday.setDate(sunday.getDate() + 6);

  document.getElementById('weekLabel').textContent =
    monday.toLocaleDateString('fr-FR', {day:'numeric', month:'short'}) + ' – ' +
    sunday.toLocaleDateString('fr-FR', {day:'numeric', month:'short', year:'numeric'});

  const grid = document.getElementById('weekGrid');
  grid.innerHTML = '';

  // Headers
  const emptyCorner = document.createElement('div');
  emptyCorner.className = 'week-day-header week-time-label';
  grid.appendChild(emptyCorner);

  const weekDays = [];
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    weekDays.push(d);
    const h = document.createElement('div');
    h.className = 'week-day-header' + (sameDay(d, today) ? ' today' : '');
    h.innerHTML = `<div>${DAYS_SHORT[d.getDay()]}</div><div style="font-size:1rem;font-weight:800;color:${sameDay(d,today)?'var(--accent)':'var(--text)'}">${d.getDate()}</div>`;
    grid.appendChild(h);
  }

  // Rows
  HOURS.forEach(h => {
    const timeLabel = document.createElement('div');
    timeLabel.className = 'time-slot';
    timeLabel.textContent = h === 24 ? '00h' : h + 'h';
    grid.appendChild(timeLabel);

    weekDays.forEach(d => {
      const cell = document.createElement('div');
      cell.className = 'week-cell' + (sameDay(d, today) ? ' today-col' : '');
      cell.onclick = () => openModal('course', { prefillHour: h, prefillDay: d.getDay() });

      data.courses.filter(c => c.day === d.getDay() && c.startHour == h).forEach(c => {
        const block = document.createElement('div');
        block.className = 'course-block';
        block.style.background = c.color + '33';
        block.style.borderLeft = `3px solid ${c.color}`;
        block.style.color = c.color;
        block.innerHTML = `<div class="course-title">${c.title}</div>${c.room ? `<div class="course-room">${c.room}</div>` : ''}`;
        block.onclick = e => { e.stopPropagation(); openModal('course-edit', c); };
        cell.appendChild(block);
      });

      grid.appendChild(cell);
    });
  });
}

function changeWeek(delta) { currentWeekOffset += delta; renderWeek(); }

// ===== MONTH VIEW =====
function renderMonth() {
  const year = currentMonthDate.getFullYear();
  const month = currentMonthDate.getMonth();
  document.getElementById('monthLabel').textContent = MONTHS_FR[month] + ' ' + year;

  const grid = document.getElementById('monthGrid');
  grid.innerHTML = '';

  ['Lun','Mar','Mer','Jeu','Ven','Sam','Dim'].forEach(d => {
    const el = document.createElement('div');
    el.className = 'month-day-label';
    el.textContent = d;
    grid.appendChild(el);
  });

  const firstDay = new Date(year, month, 1);
  const lastDay = new Date(year, month + 1, 0);
  let startDow = firstDay.getDay(); // 0=Sun
  startDow = startDow === 0 ? 6 : startDow - 1; // Make Mon=0

  for (let i = 0; i < startDow; i++) {
    const cell = document.createElement('div');
    cell.className = 'month-cell other-month';
    const d = new Date(firstDay); d.setDate(d.getDate() - (startDow - i));
    cell.innerHTML = `<div class="day-num">${d.getDate()}</div>`;
    grid.appendChild(cell);
  }

  for (let day = 1; day <= lastDay.getDate(); day++) {
    const d = new Date(year, month, day);
    const cell = document.createElement('div');
    cell.className = 'month-cell' + (sameDay(d, today) ? ' today' : '');
    cell.onclick = () => { currentDay = new Date(d); switchView('day'); };

    const dayCourses = data.courses.filter(c => c.day === d.getDay());
    const dayTasks = data.tasks.filter(t => t.date === dateKey(d));
    const dayDeadlines = data.deadlines.filter(dl => dl.dueDate === dateKey(d));

    let dots = '';
    dayCourses.slice(0,3).forEach(c => dots += `<span class="month-dot" style="background:${c.color}"></span>`);
    dayTasks.filter(t => !t.done).slice(0,2).forEach(() => dots += `<span class="month-dot" style="background:var(--accent3)"></span>`);
    dayDeadlines.forEach(() => dots += `<span class="month-dot" style="background:var(--accent2)"></span>`);

    cell.innerHTML = `<div class="day-num">${day}</div><div>${dots}</div>`;
    grid.appendChild(cell);
  }

  // Fill remaining
  const totalCells = startDow + lastDay.getDate();
  const remaining = totalCells % 7 === 0 ? 0 : 7 - (totalCells % 7);
  for (let i = 1; i <= remaining; i++) {
    const cell = document.createElement('div');
    cell.className = 'month-cell other-month';
    cell.innerHTML = `<div class="day-num">${i}</div>`;
    grid.appendChild(cell);
  }
}

function changeMonth(delta) {
  currentMonthDate.setMonth(currentMonthDate.getMonth() + delta);
  renderMonth();
}

// ===== MODAL =====
let modalType = null;
let editingItem = null;

function openModal(type, prefill = {}) {
  modalType = type;
  editingItem = null;
  const modal = document.getElementById('modalBox');
  document.getElementById('modalOverlay').classList.add('open');

  if (type === 'course-edit') {
    editingItem = prefill;
    type = 'course';
    modalType = 'course-edit';
    prefill = editingItem;
  }

  const colorSwatches = COLORS.map((c, i) =>
    `<div class="color-swatch ${i===0?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor(this)"></div>`
  ).join('');

  if (type === 'course') {
    const dayOpts = DAYS_FR.map((d,i) => `<option value="${i}" ${(prefill.prefillDay!==undefined?prefill.prefillDay:prefill.day)==i?'selected':''}>${d}</option>`).join('');
    const hourOpts = HOURS.map(h => `<option value="${h}" ${(prefill.prefillHour||prefill.startHour||8)==h?'selected':''}>${h===24?'00':h}:00</option>`).join('');
    const endOpts = HOURS.map(h => `<option value="${h}" ${(prefill.endHour||9)==h?'selected':''}>${h===24?'00':h}:00</option>`).join('');
    modal.innerHTML = `
      <h3>${editingItem ? '✏️ Modifier le cours' : '+ Nouveau cours'}</h3>
      <label>Intitulé</label>
      <input id="f_title" placeholder="ex: Mathématiques" value="${editingItem?.title||''}">
      <label>Salle (optionnel)</label>
      <input id="f_room" placeholder="ex: Amphi A, Salle 204" value="${editingItem?.room||''}">
      <label>Jour</label>
      <select id="f_day">${dayOpts}</select>
      <label>Heure début</label>
      <select id="f_start">${hourOpts}</select>
      <label>Heure fin</label>
      <select id="f_end">${endOpts}</select>
      <label>Couleur</label>
      <div class="color-row">${COLORS.map((c, i) =>
        `<div class="color-swatch ${(editingItem?.color||COLORS[0])==c?'selected':''}" style="background:${c}" data-color="${c}" onclick="selectColor(this)"></div>`
      ).join('')}</div>
      <div class="modal-actions">
        ${editingItem ? `<button class="btn-secondary" onclick="deleteCourse('${editingItem.id}')">🗑 Supprimer</button>` : ''}
        <button class="btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn-primary" onclick="saveCourse()">Enregistrer</button>
      </div>`;
  }

  else if (type === 'task') {
    const todayKey = dateKey(currentDay);
    modal.innerHTML = `
      <h3>+ Nouvelle tâche</h3>
      <label>Tâche</label>
      <input id="f_task" placeholder="ex: Réviser le chapitre 3">
      <label>Date</label>
      <input id="f_date" type="date" value="${todayKey}">
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn-primary" onclick="saveTask()">Ajouter</button>
      </div>`;
  }

  else if (type === 'deadline') {
    modal.innerHTML = `
      <h3>+ Devoir / Deadline</h3>
      <label>Description</label>
      <input id="f_dl_text" placeholder="ex: Rapport de physique, DS Maths...">
      <label>Date limite</label>
      <input id="f_dl_date" type="date">
      <label>Urgence</label>
      <select id="f_dl_urg">
        <option value="ok">🟢 Pas urgent</option>
        <option value="soon">🟡 Bientôt</option>
        <option value="urgent">🔴 Urgent</option>
      </select>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn-primary" onclick="saveDeadline()">Ajouter</button>
      </div>`;
  }

  else if (type === 'trading') {
    modal.innerHTML = `
      <h3>+ Apprentissage Trading</h3>
      <label>Sujet à apprendre</label>
      <input id="f_tr_text" placeholder="ex: Analyse technique, RSI, Fibonacci...">
      <label>Catégorie (optionnel)</label>
      <input id="f_tr_tag" placeholder="ex: TA, Fondamentaux, Psychologie...">
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn-primary" onclick="saveTrading()">Ajouter</button>
      </div>`;
  }

  else if (type === 'note') {
    modal.innerHTML = `
      <h3>+ Note rapide</h3>
      <label>Contenu</label>
      <textarea id="f_note" placeholder="Écris ta note ici..."></textarea>
      <div class="modal-actions">
        <button class="btn-secondary" onclick="closeModal()">Annuler</button>
        <button class="btn-primary" onclick="saveNote()">Enregistrer</button>
      </div>`;
  }

  // Focus first input
  setTimeout(() => { const inp = modal.querySelector('input,textarea'); if (inp) inp.focus(); }, 100);
}

function selectColor(el) {
  document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('selected'));
  el.classList.add('selected');
}
function getSelectedColor() {
  const s = document.querySelector('.color-swatch.selected');
  return s ? s.dataset.color : COLORS[0];
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  editingItem = null;
}

function uid() { return Math.random().toString(36).slice(2, 9); }

function saveCourse() {
  const title = document.getElementById('f_title').value.trim();
  if (!title) return;
  if (editingItem) {
    const c = data.courses.find(c => c.id === editingItem.id);
    if (c) {
      c.title = title;
      c.room = document.getElementById('f_room').value.trim();
      c.day = parseInt(document.getElementById('f_day').value);
      c.startHour = parseInt(document.getElementById('f_start').value);
      c.endHour = parseInt(document.getElementById('f_end').value);
      c.color = getSelectedColor();
    }
  } else {
    data.courses.push({
      id: uid(), title,
      room: document.getElementById('f_room').value.trim(),
      day: parseInt(document.getElementById('f_day').value),
      startHour: parseInt(document.getElementById('f_start').value),
      endHour: parseInt(document.getElementById('f_end').value),
      color: getSelectedColor()
    });
  }
  save(); closeModal(); renderAll();
}

function deleteCourse(id) {
  data.courses = data.courses.filter(c => c.id !== id);
  save(); closeModal(); renderAll();
}

function saveTask() {
  const text = document.getElementById('f_task').value.trim();
  if (!text) return;
  data.tasks.push({ id: uid(), text, done: false, date: document.getElementById('f_date').value });
  save(); closeModal(); renderAll();
}

function saveDeadline() {
  const text = document.getElementById('f_dl_text').value.trim();
  if (!text) return;
  data.deadlines.push({
    id: uid(), text,
    dueDate: document.getElementById('f_dl_date').value,
    urgency: document.getElementById('f_dl_urg').value
  });
  save(); closeModal(); renderAll();
}

function saveTrading() {
  const text = document.getElementById('f_tr_text').value.trim();
  if (!text) return;
  data.trading.push({ id: uid(), text, tag: document.getElementById('f_tr_tag').value.trim(), done: false });
  save(); closeModal(); renderAll();
}

function saveNote() {
  const text = document.getElementById('f_note').value.trim();
  if (!text) return;
  data.notes.push({ id: uid(), text });
  save(); closeModal(); renderAll();
}

// Close on overlay click
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

// Enter to submit
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
});

// ===== VIEWS =====
function switchView(v) {
  document.querySelectorAll('.view').forEach(el => el.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
  document.getElementById('view-' + v).classList.add('active');
  const idx = ['day','week','month'].indexOf(v);
  document.querySelectorAll('.tab-btn')[idx].classList.add('active');
  if (v === 'day') renderDay();
  if (v === 'week') renderWeek();
  if (v === 'month') renderMonth();
}

function renderAll() {
  renderDay();
  renderWeek();
  renderMonth();
}

// ===== INIT =====
renderAll();
</script>
