<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Planr</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Bricolage+Grotesque:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  // ▼▼▼ REMPLACE AVEC TA CONFIG FIREBASE ▼▼▼
  const firebaseConfig = {
    apiKey: "COLLE_ICI",
    authDomain: "COLLE_ICI",
    projectId: "COLLE_ICI",
    storageBucket: "COLLE_ICI",
    messagingSenderId: "COLLE_ICI",
    appId: "COLLE_ICI"
  };
  // ▲▲▲ ———————————————————————————————— ▲▲▲

  const DOC_ID = "mon-agenda-perso";
  let db = null;

  try {
    if (firebaseConfig.apiKey !== "COLLE_ICI") {
      const app = initializeApp(firebaseConfig);
      db = getFirestore(app);
      window.__firebaseReady = true;
    } else {
      window.__firebaseReady = false;
    }
  } catch(e) {
    console.warn("Firebase non configuré:", e);
    window.__firebaseReady = false;
  }

  window.__saveToCloud = async (data) => {
    if (!db) return;
    try {
      await setDoc(doc(db, "agenda", DOC_ID), { payload: JSON.stringify(data), updatedAt: Date.now() });
    } catch(e) { console.warn("Save failed", e); }
  };

  window.__loadFromCloud = async () => {
    if (!db) return null;
    try {
      const snap = await getDoc(doc(db, "agenda", DOC_ID));
      if (snap.exists()) return JSON.parse(snap.data().payload);
    } catch(e) { console.warn("Load failed", e); }
    return null;
  };
</script>

<style>
:root {
  --bg:     #070709;
  --s1:     #0e0e12;
  --s2:     #16161d;
  --s3:     #1e1e28;
  --border: #22222e;
  --brd2:   #2c2c3c;
  --text:   #ededf5;
  --muted:  #50506a;
  --muted2: #383850;
  --a1: #5b73ff;
  --a2: #ff5f6d;
  --a3: #00d68f;
  --a4: #ffb547;
  --a5: #38bdf8;
  --font: 'Bricolage Grotesque', sans-serif;
  --mono: 'DM Mono', monospace;
  --r: 12px;
  --rL: 16px;
  --nav: 54px;
  --bot: 66px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden;background:var(--bg)}
body{font-family:var(--font);color:var(--text);display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
::-webkit-scrollbar{width:3px;height:3px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd2);border-radius:2px}

/* SYNC */
.sync{position:fixed;top:15px;right:1rem;z-index:200;font-family:var(--mono);font-size:0.58rem;padding:3px 9px;border-radius:20px;display:flex;align-items:center;gap:5px;letter-spacing:0.04em;transition:all 0.3s}
.sync.local{background:rgba(80,80,106,0.15);color:var(--muted);border:1px solid var(--border)}
.sync.cloud{background:rgba(0,214,143,0.1);color:var(--a3);border:1px solid rgba(0,214,143,0.2)}
.sync.saving{background:rgba(91,115,255,0.1);color:var(--a1);border:1px solid rgba(91,115,255,0.2)}
.sdot{width:5px;height:5px;border-radius:50%;background:currentColor}
.sync.saving .sdot{animation:blink 0.7s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.2}}

/* HEADER */
.header{flex-shrink:0;height:var(--nav);display:flex;align-items:center;padding:0 1.1rem;border-bottom:1px solid var(--border);background:rgba(7,7,9,0.9);backdrop-filter:blur(20px);z-index:100}
.logo{font-size:1.1rem;font-weight:800;letter-spacing:-0.06em}
.logo em{color:var(--a1);font-style:normal}

/* DESKTOP TABS */
.dtabs{display:none;border-bottom:1px solid var(--border);background:var(--s1);padding:0 1.25rem}
@media(min-width:768px){.dtabs{display:flex}}
.dtab{background:none;border:none;border-bottom:2px solid transparent;color:var(--muted);font-family:var(--font);font-size:0.8rem;font-weight:600;padding:0.6rem 1rem;cursor:pointer;transition:all 0.15s;letter-spacing:0.01em}
.dtab.active{color:var(--text);border-bottom-color:var(--a1)}
.dtab:hover:not(.active){color:var(--text)}

/* BODY */
.body{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:calc(var(--bot) + 1rem)}
@media(min-width:768px){.body{padding-bottom:2rem}}

/* VIEWS */
.view{display:none;padding:1rem}
.view.active{display:block}
@media(min-width:768px){.view{padding:1.5rem 1.75rem;max-width:1200px;margin:0 auto}}

/* BOTTOM NAV */
.bnav{flex-shrink:0;position:fixed;bottom:0;left:0;right:0;height:var(--bot);background:rgba(7,7,9,0.95);backdrop-filter:blur(20px);border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-around;z-index:100;padding:0 0.5rem;padding-bottom:env(safe-area-inset-bottom)}
@media(min-width:768px){.bnav{display:none}}
.bni{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--muted);font-family:var(--font);cursor:pointer;padding:0.4rem;border-radius:10px;transition:color 0.15s}
.bni.active{color:var(--a1)}
.bni-i{font-size:1.2rem;line-height:1}
.bni-l{font-size:0.56rem;font-weight:700;text-transform:uppercase;letter-spacing:0.06em}

/* ROW HEADER */
.rh{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.rh-l{display:flex;flex-direction:column;gap:2px}
.rh-t{font-size:1.35rem;font-weight:800;letter-spacing:-0.04em;line-height:1}
.rh-s{font-family:var(--mono);font-size:0.6rem;color:var(--muted);letter-spacing:0.04em;margin-top:3px}
.rh-n{display:flex;align-items:center;gap:0.35rem}

/* BUTTONS */
.ibtn{width:30px;height:30px;border-radius:8px;border:1px solid var(--brd2);background:var(--s2);color:var(--text);cursor:pointer;font-size:0.8rem;display:flex;align-items:center;justify-content:center;transition:all 0.12s;flex-shrink:0}
.ibtn:active,.ibtn:hover{background:var(--s3)}
.ibtn.today-btn{width:auto;padding:0 9px;font-family:var(--mono);font-size:0.56rem;color:var(--a1);border-color:rgba(91,115,255,0.3);letter-spacing:0.06em}
.chip{display:flex;align-items:center;gap:4px;background:var(--s2);border:1px solid var(--brd2);color:var(--muted);font-family:var(--font);font-size:0.7rem;font-weight:600;padding:0 10px;height:30px;border-radius:8px;cursor:pointer;transition:all 0.12s}
.chip:active,.chip:hover{color:var(--a1);border-color:rgba(91,115,255,0.3)}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(2,1fr);gap:0.55rem;margin-bottom:1rem}
@media(min-width:480px){.stats{grid-template-columns:repeat(4,1fr)}}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:0.7rem 0.8rem}
.stat-n{font-family:var(--mono);font-size:0.56rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:4px}
.stat-v{font-size:1.75rem;font-weight:800;letter-spacing:-0.05em;line-height:1}
.stat-d{font-size:0.6rem;color:var(--muted);margin-top:2px}

/* DAY LAYOUT */
@media(min-width:768px){.day-grid{display:grid;grid-template-columns:1fr 280px;gap:1.1rem;align-items:start}}

/* TIMELINE */
.tl{background:var(--s1);border:1px solid var(--border);border-radius:var(--rL);overflow:hidden;margin-bottom:0.75rem}
.tl-row{display:grid;grid-template-columns:38px 1fr;border-bottom:1px solid var(--border);min-height:46px}
.tl-row:last-child{border-bottom:none}
.tl-h{font-family:var(--mono);font-size:0.55rem;color:var(--muted2);padding:7px 3px 0;text-align:center;background:var(--s2);border-right:1px solid var(--border)}
.tl-s{padding:3px 5px;cursor:pointer;transition:background 0.1s}
.tl-s:active{background:rgba(91,115,255,0.04)}
.ev{display:flex;align-items:center;gap:6px;padding:5px 7px;border-radius:7px;margin:2px 0;font-size:0.76rem;font-weight:500;cursor:pointer;transition:opacity 0.15s}
.ev:active{opacity:0.7}
.ev-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.ev-n{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:600}
.ev-t{font-family:var(--mono);font-size:0.56rem;opacity:0.6;white-space:nowrap}

/* PANEL */
.panel{background:var(--s1);border:1px solid var(--border);border-radius:var(--rL);overflow:hidden;margin-bottom:0.65rem}
.ph{display:flex;align-items:center;justify-content:space-between;padding:0.6rem 0.85rem;border-bottom:1px solid var(--border)}
.pt{display:flex;align-items:center;gap:6px;font-size:0.67rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted)}
.pdot{width:6px;height:6px;border-radius:50%}
.padd{width:24px;height:24px;border-radius:6px;border:1px solid var(--brd2);background:none;color:var(--muted);font-size:1rem;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.12s}
.padd:active,.padd:hover{color:var(--a1);border-color:rgba(91,115,255,0.3)}
.pb{padding:0.45rem 0.85rem}

/* LIST ITEMS */
.li{display:flex;align-items:flex-start;gap:8px;padding:0.48rem 0;border-bottom:1px solid rgba(255,255,255,0.03);animation:up 0.15s ease}
@keyframes up{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
.li:last-child{border-bottom:none}
.lick{width:17px;height:17px;flex-shrink:0;margin-top:2px;border-radius:5px;border:1.5px solid var(--brd2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:0.58rem;transition:all 0.15s}
.li.done .lick{background:var(--a3);border-color:var(--a3);color:#000}
.lit{flex:1;font-size:0.8rem;line-height:1.4}
.li.done .lit{text-decoration:line-through;color:var(--muted)}
.ldel{background:none;border:none;color:var(--muted2);cursor:pointer;font-size:0.75rem;padding:2px;opacity:0;transition:opacity 0.12s,color 0.12s}
.li:hover .ldel,.li:active .ldel{opacity:1}
.ldel:active{color:var(--a2)}
.badge{font-family:var(--mono);font-size:0.54rem;padding:2px 6px;border-radius:4px;white-space:nowrap;flex-shrink:0}
.tag{font-family:var(--mono);font-size:0.53rem;padding:2px 6px;border-radius:4px;background:rgba(255,181,71,0.1);color:var(--a4);border:1px solid rgba(255,181,71,0.18);white-space:nowrap}
.note{padding:0.5rem 0.65rem;background:rgba(56,189,248,0.04);border-left:2px solid var(--a5);border-radius:0 7px 7px 0;font-size:0.78rem;line-height:1.55;margin-bottom:0.4rem;position:relative;animation:up 0.15s ease}
.note:last-child{margin-bottom:0}
.ndel{position:absolute;top:4px;right:5px;background:none;border:none;color:var(--muted2);cursor:pointer;font-size:0.68rem;opacity:0;transition:opacity 0.12s}
.note:hover .ndel,.note:active .ndel{opacity:1}
.prog-w{padding:0 0.85rem 0.5rem}
.prog{height:2px;background:var(--border);border-radius:1px;overflow:hidden}
.prog-f{height:100%;border-radius:1px;transition:width 0.4s ease}
.empty{text-align:center;padding:0.8rem 0;color:var(--muted);font-size:0.73rem}

/* WEEK */
.week-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:0.75rem;border-radius:var(--rL)}
.wgrid{min-width:520px;display:grid;grid-template-columns:38px repeat(7,1fr);border:1px solid var(--border);border-radius:var(--rL);overflow:hidden;background:var(--s1)}
.wgh{background:var(--s2);padding:0.4rem 0.2rem;text-align:center;border-bottom:1px solid var(--border);border-right:1px solid var(--border)}
.wgh:last-child{border-right:none}
.wgh-d{font-family:var(--mono);font-size:0.54rem;color:var(--muted);text-transform:uppercase;letter-spacing:0.05em}
.wgh-n{font-size:0.95rem;font-weight:800;letter-spacing:-0.04em;margin-top:1px}
.wgh.today .wgh-n{color:var(--a1)}
.wgt{font-family:var(--mono);font-size:0.53rem;color:var(--muted2);padding:5px 2px 0;text-align:center;background:var(--s2);border-right:1px solid var(--border);border-bottom:1px solid var(--border)}
.wgc{border-right:1px solid var(--border);border-bottom:1px solid var(--border);min-height:42px;cursor:pointer;position:relative;transition:background 0.1s}
.wgc:last-child{border-right:none}
.wgc:active{background:rgba(91,115,255,0.04)}
.wgc.tc{background:rgba(91,115,255,0.02)}
.cpill{position:absolute;inset:2px;border-radius:6px;padding:3px 4px;font-size:0.58rem;font-weight:700;overflow:hidden;cursor:pointer;display:flex;flex-direction:column;gap:1px}
.cpill-n{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.cpill-r{font-family:var(--mono);font-size:0.5rem;opacity:0.7}

/* MONTH */
.mgrid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--border);border:1px solid var(--border);border-radius:var(--rL);overflow:hidden}
.mgl{background:var(--s2);text-align:center;padding:0.38rem 0.2rem;font-family:var(--mono);font-size:0.54rem;text-transform:uppercase;letter-spacing:0.06em;color:var(--muted)}
.mgc{background:var(--s1);min-height:58px;padding:4px;cursor:pointer;transition:background 0.1s}
@media(min-width:600px){.mgc{min-height:78px}}
.mgc:active{background:var(--s2)}
.mgc.other{opacity:0.22}
.mgc.tm{background:rgba(91,115,255,0.05)}
.mgn{font-family:var(--mono);font-size:0.66rem;font-weight:700;color:var(--muted);margin-bottom:3px}
.mgc.tm .mgn{color:var(--a1)}
.mgdots{display:flex;flex-wrap:wrap;gap:2px}
.mgdot{width:4px;height:4px;border-radius:50%}

/* MODAL */
.movl{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(8px);z-index:300;align-items:flex-end;justify-content:center}
@media(min-width:600px){.movl{align-items:center}}
.movl.open{display:flex}
.modal{background:var(--s1);border:1px solid var(--brd2);border-radius:20px 20px 0 0;padding:1rem 1rem 1.8rem;width:100%;max-width:440px;max-height:90vh;overflow-y:auto;animation:mup 0.2s cubic-bezier(0.34,1.2,0.64,1)}
@media(min-width:600px){.modal{border-radius:20px;padding:1.3rem}}
@keyframes mup{from{transform:translateY(50px);opacity:0}to{transform:none;opacity:1}}
.mhandle{width:30px;height:3px;background:var(--brd2);border-radius:2px;margin:0 auto 0.9rem}
@media(min-width:600px){.mhandle{display:none}}
.modal h3{font-size:1rem;font-weight:800;letter-spacing:-0.03em;margin-bottom:0.9rem}
.field{margin-bottom:0.65rem}
.field label{display:block;font-family:var(--mono);font-size:0.58rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-bottom:0.28rem}
.field input,.field select,.field textarea{width:100%;background:var(--s2);border:1px solid var(--brd2);color:var(--text);border-radius:9px;padding:0.52rem 0.75rem;font-family:var(--font);font-size:0.86rem;outline:none;transition:border-color 0.15s;-webkit-appearance:none}
.field input:focus,.field select:focus,.field textarea:focus{border-color:var(--a1)}
.field textarea{resize:vertical;min-height:72px}
.crow{display:flex;gap:7px;flex-wrap:wrap}
.csw{width:26px;height:26px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all 0.12s}
.csw.sel{border-color:#fff;transform:scale(1.15)}
.mact{display:flex;gap:0.45rem;margin-top:0.9rem}
.btn{flex:1;border:none;border-radius:9px;padding:0.62rem 0.9rem;font-family:var(--font);font-size:0.86rem;font-weight:700;cursor:pointer;transition:all 0.12s}
.btn-p{background:var(--a1);color:#fff}
.btn-p:active{background:#4a62ee;transform:scale(0.98)}
.btn-g{background:var(--s2);color:var(--muted);border:1px solid var(--brd2);flex:none;padding:0.62rem 0.85rem}
.btn-g:active{color:var(--text)}
.btn-d{background:rgba(255,95,109,0.1);color:var(--a2);border:1px solid rgba(255,95,109,0.18);flex:none;padding:0.62rem 0.85rem}
</style>
</head>
<body>

<div class="sync local" id="sync"><div class="sdot"></div><span id="syncTxt">LOCAL</span></div>

<header class="header">
  <div class="logo">pl<em>a</em>nr</div>
</header>

<div class="dtabs">
  <button class="dtab active" onclick="sv('day')">Aujourd'hui</button>
  <button class="dtab" onclick="sv('week')">Semaine</button>
  <button class="dtab" onclick="sv('month')">Mois</button>
</div>

<div class="body">

  <!-- DAY -->
  <div class="view active" id="view-day">
    <div class="rh">
      <div class="rh-l">
        <div class="rh-t" id="dayTitle"></div>
        <div class="rh-s" id="daySub"></div>
      </div>
      <div class="rh-n">
        <button class="ibtn" onclick="chDay(-1)">‹</button>
        <button class="ibtn today-btn" onclick="goToday()">TODAY</button>
        <button class="ibtn" onclick="chDay(1)">›</button>
      </div>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-n">Cours</div><div class="stat-v" id="sC" style="color:var(--a1)">0</div><div class="stat-d">aujourd'hui</div></div>
      <div class="stat"><div class="stat-n">Tâches</div><div class="stat-v" id="sT" style="color:var(--a3)">0</div><div class="stat-d">en attente</div></div>
      <div class="stat"><div class="stat-n">Deadlines</div><div class="stat-v" id="sD" style="color:var(--a2)">0</div><div class="stat-d">cette semaine</div></div>
      <div class="stat"><div class="stat-n">Trading</div><div class="stat-v" id="sTr" style="color:var(--a4)">0</div><div class="stat-d">à apprendre</div></div>
    </div>

    <div class="day-grid">
      <div><div class="tl" id="dayTL"></div></div>
      <div>
        <div class="panel">
          <div class="ph"><div class="pt"><div class="pdot" style="background:var(--a3)"></div>Tâches</div><button class="padd" onclick="om('task')">+</button></div>
          <div class="pb" id="taskList"></div>
          <div class="prog-w"><div class="prog"><div class="prog-f" id="tProg" style="background:var(--a3);width:0%"></div></div></div>
        </div>
        <div class="panel">
          <div class="ph"><div class="pt"><div class="pdot" style="background:var(--a2)"></div>Devoirs & Deadlines</div><button class="padd" onclick="om('deadline')">+</button></div>
          <div class="pb" id="dlList"></div>
        </div>
        <div class="panel">
          <div class="ph"><div class="pt"><div class="pdot" style="background:var(--a4)"></div>Trading</div><button class="padd" onclick="om('trading')">+</button></div>
          <div class="pb" id="trList"></div>
        </div>
        <div class="panel">
          <div class="ph"><div class="pt"><div class="pdot" style="background:var(--a5)"></div>Notes</div><button class="padd" onclick="om('note')">+</button></div>
          <div class="pb" id="noteList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- WEEK -->
  <div class="view" id="view-week">
    <div class="rh">
      <div class="rh-t" id="weekLabel"></div>
      <div class="rh-n">
        <button class="ibtn" onclick="chWeek(-1)">‹</button>
        <button class="ibtn today-btn" onclick="resetWeek()">TODAY</button>
        <button class="ibtn" onclick="chWeek(1)">›</button>
        <button class="chip" onclick="om('course')">+ Cours</button>
      </div>
    </div>
    <div class="week-scroll"><div class="wgrid" id="weekGrid"></div></div>
  </div>

  <!-- MONTH -->
  <div class="view" id="view-month">
    <div class="rh">
      <div class="rh-t" id="monthLabel"></div>
      <div class="rh-n">
        <button class="ibtn" onclick="chMonth(-1)">‹</button>
        <button class="ibtn today-btn" onclick="resetMonth()">TODAY</button>
        <button class="ibtn" onclick="chMonth(1)">›</button>
      </div>
    </div>
    <div class="mgrid" id="monthGrid"></div>
  </div>

</div>

<nav class="bnav">
  <button class="bni active" id="bn-day" onclick="sv('day')"><span class="bni-i">◈</span><span class="bni-l">Jour</span></button>
  <button class="bni" id="bn-week" onclick="sv('week')"><span class="bni-i">▦</span><span class="bni-l">Semaine</span></button>
  <button class="bni" id="bn-month" onclick="sv('month')"><span class="bni-i">▤</span><span class="bni-l">Mois</span></button>
</nav>

<div class="movl" id="movl" onclick="hOvl(event)">
  <div class="modal" id="mbox"></div>
</div>

<script>
const COLORS=['#5b73ff','#ff5f6d','#00d68f','#ffb547','#38bdf8','#a78bfa','#f472b6','#34d399'];
const DFR=['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
const DS=['Dim','Lun','Mar','Mer','Jeu','Ven','Sam'];
const MON=['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
const HOURS=Array.from({length:18},(_,i)=>i+7);

const today=new Date();today.setHours(0,0,0,0);
let curDay=new Date(today),wOff=0,monDt=new Date(today),editItem=null,saveTimer=null;
let data={courses:[],tasks:[],deadlines:[],trading:[],notes:[]};

const dk=d=>d.toISOString().split('T')[0];
const sd=(a,b)=>dk(a)===dk(b);
const uid=()=>Math.random().toString(36).slice(2,9);
const pd=s=>{const[y,m,d]=s.split('-').map(Number);return new Date(y,m-1,d);};
const fh=h=>h===24?'00':String(h).padStart(2,'0');
function getMon(d){const r=new Date(d),dow=r.getDay();r.setDate(r.getDate()-(dow===0?6:dow-1));return r;}

function setSS(st){const b=document.getElementById('sync'),t=document.getElementById('syncTxt');b.className='sync '+st;t.textContent=st==='cloud'?'CLOUD':st==='saving'?'SYNC…':'LOCAL';}
function saveLocal(){try{localStorage.setItem('planr_v2',JSON.stringify(data));}catch(e){}}
function loadLocal(){try{const d=localStorage.getItem('planr_v2');if(d){data=JSON.parse(d);return true;}}catch(e){}return false;}

function scheduleSave(){
  saveLocal();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    if(window.__firebaseReady){setSS('saving');await window.__saveToCloud(data);setSS('cloud');}
  },1000);
}

async function init(){
  loadLocal();
  if(window.__firebaseReady){
    setSS('saving');
    const cloud=await window.__loadFromCloud();
    if(cloud){data=cloud;saveLocal();}
    setSS('cloud');
  } else {setSS('local');}
  renderAll();
}

function updateStats(){
  const tk=dk(curDay);
  document.getElementById('sC').textContent=data.courses.filter(c=>c.day===curDay.getDay()).length;
  document.getElementById('sT').textContent=data.tasks.filter(t=>t.date===tk&&!t.done).length;
  const m=getMon(today),s=new Date(m);s.setDate(s.getDate()+6);
  document.getElementById('sD').textContent=data.deadlines.filter(d=>{if(!d.dueDate)return false;const dd=pd(d.dueDate);return dd>=m&&dd<=s;}).length;
  document.getElementById('sTr').textContent=data.trading.filter(t=>!t.done).length;
}

function renderDay(){
  document.getElementById('dayTitle').textContent=curDay.toLocaleDateString('fr-FR',{weekday:'long',day:'numeric',month:'long'});
  document.getElementById('daySub').textContent=sd(curDay,today)?'Aujourd\'hui':'';
  updateStats();
  const tl=document.getElementById('dayTL');tl.innerHTML='';
  const courses=data.courses.filter(c=>c.day===curDay.getDay());
  HOURS.forEach(h=>{
    const row=document.createElement('div');row.className='tl-row';
    const hr=document.createElement('div');hr.className='tl-h';hr.textContent=fh(h);
    const sl=document.createElement('div');sl.className='tl-s';
    sl.onclick=()=>om('course',{pH:h,pD:curDay.getDay()});
    courses.filter(c=>c.startHour==h).forEach(c=>{
      const e=document.createElement('div');e.className='ev';
      e.style.cssText=`background:${c.color}18;border-left:2px solid ${c.color};color:${c.color}`;
      e.innerHTML=`<div class="ev-dot" style="background:${c.color}"></div><span class="ev-n">${c.title}${c.room?' · '+c.room:''}</span><span class="ev-t">${fh(c.startHour)}h–${fh(c.endHour)}h</span>`;
      e.onclick=ev=>{ev.stopPropagation();om('course-edit',c);};
      sl.appendChild(e);
    });
    row.appendChild(hr);row.appendChild(sl);tl.appendChild(row);
  });

  const tk=dk(curDay),tasks=data.tasks.filter(t=>t.date===tk);
  const tEl=document.getElementById('taskList');
  if(!tasks.length){tEl.innerHTML='<div class="empty">Rien à faire 🎉</div>';document.getElementById('tProg').style.width='0%';}
  else{
    tEl.innerHTML='';
    tasks.forEach(t=>{const d=document.createElement('div');d.className='li'+(t.done?' done':'');d.innerHTML=`<div class="lick">${t.done?'✓':''}</div><span class="lit">${t.text}</span><button class="ldel" onclick="dl('tasks','${t.id}')">✕</button>`;d.querySelector('.lick').onclick=()=>togT(t.id);tEl.appendChild(d);});
    const done=tasks.filter(t=>t.done).length;document.getElementById('tProg').style.width=(done/tasks.length*100)+'%';
  }

  const dEl=document.getElementById('dlList');
  if(!data.deadlines.length){dEl.innerHTML='<div class="empty">Aucun devoir ✅</div>';}
  else{dEl.innerHTML='';data.deadlines.forEach(d=>{const s=ugSt(d.urgency);const el=document.createElement('div');el.className='li';const due=d.dueDate?pd(d.dueDate).toLocaleDateString('fr-FR',{day:'numeric',month:'short'}):'?';el.innerHTML=`<span class="badge" style="background:${s.bg};color:${s.c};border:1px solid ${s.b}">${due}</span><span class="lit">${d.text}</span><button class="ldel" onclick="dl('deadlines','${d.id}')">✕</button>`;dEl.appendChild(el);});}

  const trEl=document.getElementById('trList');
  if(!data.trading.length){trEl.innerHTML='<div class="empty">Ajoute tes sujets 📈</div>';}
  else{trEl.innerHTML='';data.trading.forEach(t=>{const el=document.createElement('div');el.className='li';el.style.opacity=t.done?'0.4':'1';el.innerHTML=`<span style="cursor:pointer;font-size:0.85rem" onclick="togTr('${t.id}')">${t.done?'✅':'◎'}</span><span class="lit" style="${t.done?'text-decoration:line-through':''}">${t.text}</span>${t.tag?`<span class="tag">${t.tag}</span>`:''}<button class="ldel" onclick="dl('trading','${t.id}')">✕</button>`;trEl.appendChild(el);});}

  const nEl=document.getElementById('noteList');
  if(!data.notes.length){nEl.innerHTML='<div class="empty">Aucune note 📝</div>';}
  else{nEl.innerHTML='';data.notes.forEach(n=>{const el=document.createElement('div');el.className='note';el.innerHTML=`${n.text}<button class="ndel" onclick="dl('notes','${n.id}')">✕</button>`;nEl.appendChild(el);});}
}

function ugSt(u){if(u==='urgent')return{bg:'rgba(255,95,109,0.1)',c:'var(--a2)',b:'rgba(255,95,109,0.22)'};if(u==='soon')return{bg:'rgba(255,181,71,0.1)',c:'var(--a4)',b:'rgba(255,181,71,0.22)'};return{bg:'rgba(0,214,143,0.07)',c:'var(--a3)',b:'rgba(0,214,143,0.18)'};}
function togT(id){const t=data.tasks.find(t=>t.id===id);if(t){t.done=!t.done;scheduleSave();renderDay();}}
function togTr(id){const t=data.trading.find(t=>t.id===id);if(t){t.done=!t.done;scheduleSave();renderDay();}}
function dl(type,id){data[type]=data[type].filter(i=>i.id!==id);scheduleSave();renderAll();}
function chDay(d){curDay.setDate(curDay.getDate()+d);renderDay();}
function goToday(){curDay=new Date(today);renderDay();}

function renderWeek(){
  const mon=getMon(new Date(today));mon.setDate(mon.getDate()+wOff*7);
  const sun=new Date(mon);sun.setDate(sun.getDate()+6);
  document.getElementById('weekLabel').textContent=mon.toLocaleDateString('fr-FR',{day:'numeric',month:'short'})+' – '+sun.toLocaleDateString('fr-FR',{day:'numeric',month:'short',year:'numeric'});
  const grid=document.getElementById('weekGrid');grid.innerHTML='';
  const corner=document.createElement('div');corner.className='wgh';grid.appendChild(corner);
  const days=[];for(let i=0;i<7;i++){const d=new Date(mon);d.setDate(mon.getDate()+i);days.push(d);}
  days.forEach(d=>{const h=document.createElement('div');h.className='wgh'+(sd(d,today)?' today':'');h.innerHTML=`<div class="wgh-d">${DS[d.getDay()]}</div><div class="wgh-n">${d.getDate()}</div>`;grid.appendChild(h);});
  HOURS.forEach(h=>{
    const tl=document.createElement('div');tl.className='wgt';tl.textContent=fh(h);grid.appendChild(tl);
    days.forEach(d=>{
      const cell=document.createElement('div');cell.className='wgc'+(sd(d,today)?' tc':'');
      cell.onclick=()=>om('course',{pH:h,pD:d.getDay()});
      data.courses.filter(c=>c.day===d.getDay()&&c.startHour==h).forEach(c=>{const p=document.createElement('div');p.className='cpill';p.style.cssText=`background:${c.color}20;border-left:2px solid ${c.color};color:${c.color}`;p.innerHTML=`<div class="cpill-n">${c.title}</div>${c.room?`<div class="cpill-r">${c.room}</div>`:''}`;p.onclick=e=>{e.stopPropagation();om('course-edit',c);};cell.appendChild(p);});
      grid.appendChild(cell);
    });
  });
}
function chWeek(d){wOff+=d;renderWeek();}
function resetWeek(){wOff=0;renderWeek();}

function renderMonth(){
  const y=monDt.getFullYear(),m=monDt.getMonth();
  document.getElementById('monthLabel').textContent=MON[m]+' '+y;
  const grid=document.getElementById('monthGrid');grid.innerHTML='';
  ['L','M','M','J','V','S','D'].forEach(d=>{const el=document.createElement('div');el.className='mgl';el.textContent=d;grid.appendChild(el);});
  const first=new Date(y,m,1),last=new Date(y,m+1,0);
  let start=first.getDay();start=start===0?6:start-1;
  for(let i=0;i<start;i++){const d=new Date(first);d.setDate(d.getDate()-(start-i));const el=document.createElement('div');el.className='mgc other';el.innerHTML=`<div class="mgn">${d.getDate()}</div>`;grid.appendChild(el);}
  for(let day=1;day<=last.getDate();day++){
    const d=new Date(y,m,day);
    const el=document.createElement('div');el.className='mgc'+(sd(d,today)?' tm':'');
    el.onclick=()=>{curDay=new Date(d);sv('day');};
    const cs=data.courses.filter(c=>c.day===d.getDay());
    const ts=data.tasks.filter(t=>t.date===dk(d)&&!t.done);
    const ds=data.deadlines.filter(dl=>dl.dueDate===dk(d));
    let dots='';
    cs.slice(0,3).forEach(c=>dots+=`<div class="mgdot" style="background:${c.color}"></div>`);
    ts.slice(0,2).forEach(()=>dots+=`<div class="mgdot" style="background:var(--a3)"></div>`);
    ds.forEach(()=>dots+=`<div class="mgdot" style="background:var(--a2)"></div>`);
    el.innerHTML=`<div class="mgn">${day}</div><div class="mgdots">${dots}</div>`;grid.appendChild(el);
  }
  const total=start+last.getDate(),rem=total%7===0?0:7-total%7;
  for(let i=1;i<=rem;i++){const el=document.createElement('div');el.className='mgc other';el.innerHTML=`<div class="mgn">${i}</div>`;grid.appendChild(el);}
}
function chMonth(d){monDt.setMonth(monDt.getMonth()+d);renderMonth();}
function resetMonth(){monDt=new Date(today);renderMonth();}

function om(type,pre={}){
  if(type==='course-edit'){editItem=pre;type='course';}else editItem=null;
  const box=document.getElementById('mbox');
  document.getElementById('movl').classList.add('open');
  const sw=COLORS.map(c=>`<div class="csw${(editItem?.color||COLORS[0])===c?' sel':''}" style="background:${c}" data-color="${c}" onclick="pc(this)"></div>`).join('');
  if(type==='course'){
    const dO=DFR.map((d,i)=>`<option value="${i}" ${(pre.pD!==undefined?pre.pD:editItem?.day)===i?'selected':''}>${d}</option>`).join('');
    const sO=HOURS.map(h=>`<option value="${h}" ${(pre.pH||editItem?.startHour||8)===h?'selected':''}>${fh(h)}:00</option>`).join('');
    const eO=HOURS.map(h=>`<option value="${h}" ${(editItem?.endHour||9)===h?'selected':''}>${fh(h)}:00</option>`).join('');
    box.innerHTML=`<div class="mhandle"></div><h3>${editItem?'Modifier le cours':'Nouveau cours'}</h3>
    <div class="field"><label>Matière</label><input id="ft" placeholder="ex: Mathématiques" value="${editItem?.title||''}"></div>
    <div class="field"><label>Salle</label><input id="fr" placeholder="ex: Amphi A" value="${editItem?.room||''}"></div>
    <div class="field"><label>Jour</label><select id="fd">${dO}</select></div>
    <div class="field"><label>Début</label><select id="fs">${sO}</select></div>
    <div class="field"><label>Fin</label><select id="fe">${eO}</select></div>
    <div class="field"><label>Couleur</label><div class="crow">${sw}</div></div>
    <div class="mact">${editItem?`<button class="btn btn-d" onclick="delC('${editItem.id}')">🗑</button>`:''}
    <button class="btn btn-g" onclick="cm()">Annuler</button><button class="btn btn-p" onclick="saveC()">Enregistrer</button></div>`;
  }else if(type==='task'){
    box.innerHTML=`<div class="mhandle"></div><h3>Nouvelle tâche</h3>
    <div class="field"><label>Tâche</label><input id="ftk" placeholder="ex: Réviser chapitre 3"></div>
    <div class="field"><label>Date</label><input id="ftd" type="date" value="${dk(curDay)}"></div>
    <div class="mact"><button class="btn btn-g" onclick="cm()">Annuler</button><button class="btn btn-p" onclick="saveT()">Ajouter</button></div>`;
  }else if(type==='deadline'){
    box.innerHTML=`<div class="mhandle"></div><h3>Devoir / Deadline</h3>
    <div class="field"><label>Description</label><input id="fdl" placeholder="ex: Rapport de physique"></div>
    <div class="field"><label>Date limite</label><input id="fdd" type="date"></div>
    <div class="field"><label>Urgence</label><select id="fdu"><option value="ok">🟢 Pas urgent</option><option value="soon">🟡 Bientôt</option><option value="urgent">🔴 Urgent</option></select></div>
    <div class="mact"><button class="btn btn-g" onclick="cm()">Annuler</button><button class="btn btn-p" onclick="saveDl()">Ajouter</button></div>`;
  }else if(type==='trading'){
    box.innerHTML=`<div class="mhandle"></div><h3>Apprentissage Trading</h3>
    <div class="field"><label>Sujet</label><input id="ftr" placeholder="ex: RSI, Price Action…"></div>
    <div class="field"><label>Catégorie</label><input id="ftg" placeholder="ex: TA, Psychologie…"></div>
    <div class="mact"><button class="btn btn-g" onclick="cm()">Annuler</button><button class="btn btn-p" onclick="saveTr()">Ajouter</button></div>`;
  }else if(type==='note'){
    box.innerHTML=`<div class="mhandle"></div><h3>Note rapide</h3>
    <div class="field"><label>Contenu</label><textarea id="fn" placeholder="Écris ta note ici…"></textarea></div>
    <div class="mact"><button class="btn btn-g" onclick="cm()">Annuler</button><button class="btn btn-p" onclick="saveN()">Enregistrer</button></div>`;
  }
  setTimeout(()=>{const i=box.querySelector('input,textarea');if(i)i.focus();},150);
}
function pc(el){document.querySelectorAll('.csw').forEach(s=>s.classList.remove('sel'));el.classList.add('sel');}
function gc(){const s=document.querySelector('.csw.sel');return s?s.dataset.color:COLORS[0];}
function cm(){document.getElementById('movl').classList.remove('open');editItem=null;}
function hOvl(e){if(e.target===document.getElementById('movl'))cm();}
function saveC(){const t=document.getElementById('ft').value.trim();if(!t)return;const obj={id:editItem?.id||uid(),title:t,room:document.getElementById('fr').value.trim(),day:+document.getElementById('fd').value,startHour:+document.getElementById('fs').value,endHour:+document.getElementById('fe').value,color:gc()};if(editItem){const i=data.courses.findIndex(c=>c.id===editItem.id);if(i>=0)data.courses[i]=obj;}else data.courses.push(obj);scheduleSave();cm();renderAll();}
function delC(id){data.courses=data.courses.filter(c=>c.id!==id);scheduleSave();cm();renderAll();}
function saveT(){const t=document.getElementById('ftk').value.trim();if(!t)return;data.tasks.push({id:uid(),text:t,done:false,date:document.getElementById('ftd').value});scheduleSave();cm();renderAll();}
function saveDl(){const t=document.getElementById('fdl').value.trim();if(!t)return;data.deadlines.push({id:uid(),text:t,dueDate:document.getElementById('fdd').value,urgency:document.getElementById('fdu').value});scheduleSave();cm();renderAll();}
function saveTr(){const t=document.getElementById('ftr').value.trim();if(!t)return;data.trading.push({id:uid(),text:t,tag:document.getElementById('ftg').value.trim(),done:false});scheduleSave();cm();renderAll();}
function saveN(){const t=document.getElementById('fn').value.trim();if(!t)return;data.notes.push({id:uid(),text:t});scheduleSave();cm();renderAll();}

function sv(v){
  document.querySelectorAll('.view').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.bni').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.dtab').forEach(b=>b.classList.remove('active'));
  document.getElementById('view-'+v).classList.add('active');
  const bn=document.getElementById('bn-'+v);if(bn)bn.classList.add('active');
  const idx={day:0,week:1,month:2}[v];document.querySelectorAll('.dtab')[idx]?.classList.add('active');
  if(v==='day')renderDay();if(v==='week')renderWeek();if(v==='month')renderMonth();
  document.querySelector('.body').scrollTop=0;
}
function renderAll(){renderDay();renderWeek();renderMonth();}
document.addEventListener('keydown',e=>{if(e.key==='Escape')cm();});
setTimeout(init,400);
</script>
</body>
</html>
